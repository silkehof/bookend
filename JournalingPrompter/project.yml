name: JournalingPrompter
options:
  bundleIdPrefix: com.yourcompany
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  JournalingPrompter:
    type: application
    platform: iOS
    sources:
      - JournalingPrompter
    settings:
      base:
        INFOPLIST_FILE: JournalingPrompter/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.JournalingPrompter
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
